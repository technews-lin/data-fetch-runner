name: Daily

on:
  workflow_dispatch:
  schedule:
    # 06:30 台灣 = 22:30 UTC（給 CF 30 分鐘先抓 list）
    - cron: '30 22 * * *'

jobs:
  detail:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runner: [d1, d2, d3, d4, d5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q curl_cffi
      - env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          RUNNER_ID: ${{ matrix.runner }}
          BATCH_SIZE: '20'
          MAX_ITER: '8'
        run: python3 daily_worker.py
