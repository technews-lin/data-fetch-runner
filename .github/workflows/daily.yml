name: Daily

on:
  workflow_dispatch:
  schedule:
    # 06:30 / 07:00 / 07:30 / 08:00 台灣（22:30 / 23:00 / 23:30 / 00:00 UTC）
    # 第一波正常處理，後三波是補跑保險，確保 09:00 前完整
    - cron: '30 22 * * *'
    - cron: '0 23 * * *'
    - cron: '30 23 * * *'
    - cron: '0 0 * * *'

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Reset stuck claimed daily_tasks (>10 min)
        run: |
          curl -fsS -X POST \
            "${API_ENDPOINT}/reset-claimed-daily" \
            -H "Authorization: Bearer ${API_TOKEN}"
        env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_TOKEN: ${{ secrets.API_TOKEN }}

  check:
    needs: reset
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      incomplete: ${{ steps.q.outputs.incomplete }}
    steps:
      - id: q
        name: Count incomplete (pending + claimed) for today
        run: |
          resp=$(curl -fsS \
            "${API_ENDPOINT}/api/daily-incomplete" \
            -H "Authorization: Bearer ${API_TOKEN}")
          echo "response: $resp"
          n=$(echo "$resp" | python3 -c "import sys,json; print(json.load(sys.stdin)['incomplete'])")
          echo "incomplete: $n"
          echo "incomplete=$n" >> "$GITHUB_OUTPUT"
        env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_TOKEN: ${{ secrets.API_TOKEN }}

  detail:
    needs: check
    if: ${{ fromJSON(needs.check.outputs.incomplete) > 0 }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        runner: [d1, d2, d3, d4, d5, d6, d7, d8, d9, d10, d11, d12, d13, d14, d15]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q curl_cffi
      - env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          RUNNER_ID: ${{ matrix.runner }}
          BATCH_SIZE: '20'
          MAX_ITER: '5'
          PYTHONUNBUFFERED: '1'
        run: python3 daily_worker.py
