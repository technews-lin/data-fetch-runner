name: Daily

on:
  workflow_dispatch:
  schedule:
    # 06:30 台灣 = 22:30 UTC（給 CF 30 分鐘先抓 list）
    - cron: '30 22 * * *'

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Reset stuck claimed daily_tasks (>10 min)
        run: |
          curl -fsS -X POST \
            "${API_ENDPOINT}/reset-claimed-daily" \
            -H "Authorization: Bearer ${API_TOKEN}"
        env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_TOKEN: ${{ secrets.API_TOKEN }}

  detail:
    needs: reset
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runner: [d1, d2, d3, d4, d5, d6, d7, d8, d9, d10, d11, d12, d13, d14, d15]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q curl_cffi
      - env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          RUNNER_ID: ${{ matrix.runner }}
          BATCH_SIZE: '20'
          MAX_ITER: '5'
          PYTHONUNBUFFERED: '1'
        run: python3 daily_worker.py
