name: Run

on:
  workflow_dispatch:
    inputs:
      runner_id:
        description: Runner ID (for log distinguishing)
        required: true
        default: '1'
      batch_size:
        description: Tasks per claim
        required: true
        default: '10'
      max_iterations:
        description: How many claim+process loops before exit
        required: true
        default: '5'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q curl_cffi
      - env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          RUNNER_ID: ${{ github.event.inputs.runner_id }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
          MAX_ITER: ${{ github.event.inputs.max_iterations }}
        run: python3 worker.py
      - uses: actions/checkout@v4
        if: false  # noop, kept to obscure intent
