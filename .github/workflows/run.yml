name: Run

on:
  workflow_dispatch:
    inputs:
      parallel:
        description: How many parallel runners (max 20)
        required: true
        default: '10'
      batch_size:
        description: Tasks per claim
        required: true
        default: '20'
      max_iterations:
        description: Claim+process loops per runner
        required: true
        default: '8'
  schedule:
    # 每 30 分鐘自動 fire 一次（backfill 衝刺；daily 階段可調回 0 */4 * * *）
    - cron: '*/30 * * * *'

jobs:
  expand:
    runs-on: ubuntu-latest
    outputs:
      runners: ${{ steps.gen.outputs.runners }}
    steps:
      - id: gen
        run: |
          P=${{ github.event.inputs.parallel || '10' }}
          ARR="["
          for i in $(seq 1 $P); do
            ARR="$ARR\"r$i\""
            [ $i -lt $P ] && ARR="$ARR,"
          done
          ARR="$ARR]"
          echo "runners=$ARR" >> $GITHUB_OUTPUT
          echo "Will spawn: $ARR"

  run:
    needs: expand
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(needs.expand.outputs.runners) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q curl_cffi
      - env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          RUNNER_ID: ${{ matrix.runner }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '20' }}
          MAX_ITER: ${{ github.event.inputs.max_iterations || '8' }}
        run: python3 worker.py
